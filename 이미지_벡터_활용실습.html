<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>고급 벡터 작업실 - 자유 창작</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;900&family=Pretendard:wght@400;600;800;900&display=swap');

:root {
  --primary: #4f46e5; /* Indigo */
  --primary-hover: #4338ca;
  --secondary: #ec4899; /* Pink */
  --dark: #0f172a;
  --panel-bg: #ffffff;
  --bg: #f1f5f9;
  --border: #cbd5e1;
  --text-main: #334155;
  --text-muted: #64748b;
  --accent-green: #10b981;
  --accent-red: #ef4444;
}

* { box-sizing: border-box; margin: 0; padding: 0; cursor: default !important; }
body { font-family: 'Pretendard', sans-serif; background: var(--bg); color: var(--text-main); height: 100vh; display: flex; flex-direction: column; overflow: hidden; padding-top: 48px; }

/* 커스텀 스크롤바 */
::-webkit-scrollbar { width: 8px; height: 8px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #94a3b8; border-radius: 10px; border: 2px solid transparent; background-clip: padding-box; }
::-webkit-scrollbar-thumb:hover { background: #64748b; }

/* ✅ 공통 상단 네비게이션 바 (복구 완료) */
#dbb-topnav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 9999999;
    display: flex; align-items: center; justify-content: space-between;
    padding: 9px 22px;
    background: rgba(18,12,30,0.85);
    backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    border-bottom: 1px solid rgba(255,255,255,0.1);
    box-shadow: 0 4px 20px rgba(0,0,0,0.4);
    font-family: 'Noto Sans KR','Pretendard','Inter',sans-serif;
    box-sizing: border-box;
}



.header-badges { display: flex; gap: 10px; }
.badge { background: #e0e7ff; color: var(--primary); padding: 4px 12px; border-radius: 20px; font-size: 0.75rem; font-weight: 800; font-family: 'JetBrains Mono', sans-serif; border: 1px solid rgba(99, 102, 241, 0.3); }

/* 메인 레이아웃 (3단 분리: 도구 - 캔버스 - 코드) */
.main-area { flex: 1; display: flex; padding: 20px; gap: 20px; height: calc(100vh - 48px); overflow: hidden; }

/* 왼쪽: 컨트롤 패널 */
.control-panel { width: 320px; background: var(--panel-bg); border-radius: 16px; display: flex; flex-direction: column; overflow-y: auto; box-shadow: 0 10px 25px rgba(0,0,0,0.05); flex-shrink: 0;}
.panel-section { padding: 20px; border-bottom: 1px solid #e2e8f0; }
.panel-section:last-child { border-bottom: none; }
.section-title { font-size: 0.95rem; font-weight: 800; margin-bottom: 12px; color: var(--dark); display: flex; align-items: center; gap: 6px; }

/* 모드 버튼 그리드 */
.mode-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.mode-btn { padding: 12px 10px; border: 2px solid var(--border); background: white; border-radius: 12px; font-weight: 800; font-size: 0.9rem; color: var(--text-muted); cursor: pointer !important; transition: 0.2s; display: flex; flex-direction: column; align-items: center; gap: 6px; }
.mode-btn span { font-size: 1.2rem; }
.mode-btn:hover { border-color: var(--primary); color: var(--primary); background: #f8fafc; }
.mode-btn.active { background: var(--primary); border-color: var(--primary); color: white; box-shadow: 0 4px 12px rgba(79, 70, 229, 0.3); }
.mode-btn.active span { filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2)); }

/* 헬프 텍스트 */
.help-box { background: #f1f5f9; padding: 12px 15px; border-radius: 10px; font-size: 0.85rem; color: var(--text-main); line-height: 1.5; border-left: 4px solid var(--primary); font-weight: 600; margin-top: 15px; word-break: keep-all; }

/* 컬러 팔레트 */
.palette { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; }
.color-swatch { aspect-ratio: 1; border-radius: 8px; cursor: pointer !important; transition: 0.2s; border: 2px solid transparent; position: relative; overflow: hidden; }
.color-swatch:hover { transform: scale(1.15); box-shadow: 0 4px 8px rgba(0,0,0,0.15); z-index: 5; }
.color-swatch.active { border-color: var(--dark); transform: scale(1.15); box-shadow: 0 4px 10px rgba(0,0,0,0.3); z-index: 5; }

/* 두께 슬라이더 */
.slider-wrap { display: flex; align-items: center; gap: 15px; }
.slider { flex: 1; appearance: none; height: 8px; border-radius: 4px; background: #e2e8f0; outline: none; cursor: pointer !important; }
.slider::-webkit-slider-thumb { appearance: none; width: 20px; height: 20px; border-radius: 50%; background: var(--primary); cursor: pointer !important; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
.slider-val { font-family: 'JetBrains Mono', monospace; font-weight: 800; width: 40px; text-align: right; }

/* 액션 버튼 */
.action-row { display: flex; gap: 10px; margin-top: 15px; }
.btn { flex: 1; padding: 12px; border: none; border-radius: 10px; font-weight: 800; font-size: 0.9rem; cursor: pointer !important; transition: 0.2s; display: flex; justify-content: center; align-items: center; gap: 6px; }
.btn-finish { background: var(--accent-green); color: white; box-shadow: 0 4px 10px rgba(16, 185, 129, 0.3); }
.btn-finish:hover { background: #059669; transform: translateY(-2px); }
.btn-finish:disabled { background: #a7f3d0; cursor: not-allowed !important; transform: none; box-shadow: none; }
.btn-clear { background: #fee2e2; color: var(--accent-red); border: 1.5px solid rgba(239, 68, 68, 0.3); }
.btn-clear:hover { background: #fecaca; }

/* 가운데: 캔버스 */
.canvas-area { flex: 1; position: relative; background: #f8fafc; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); overflow: hidden; display: flex; flex-direction: column; border: 2px solid var(--border); }
.svg-wrap { width: 100%; height: 100%; background: #f8fafc; position: relative; overflow: hidden; }
#artCanvas { width: 100%; height: 100%; display: block; touch-action: none; }

/* SVG 요소 스타일 */
.grid-pattern { stroke: #e2e8f0; stroke-width: 1; }
.drawing-temp-line { stroke: var(--primary); stroke-dasharray: 6,6; fill: none; pointer-events: none; animation: dashMove 1s linear infinite; }
@keyframes dashMove { to { stroke-dashoffset: -12; } }

.drawn-obj { cursor: pointer !important; transition: filter 0.2s, stroke-width 0.2s; pointer-events: all; }
.mode-erase .drawn-obj:hover { filter: drop-shadow(0 0 8px rgba(239,68,68,0.6)); stroke: var(--accent-red) !important; stroke-width: 6 !important;}
.mode-fill .drawn-obj:hover { filter: drop-shadow(0 0 8px rgba(16,185,129,0.6)); }

.edit-node { fill: white; stroke: #475569; stroke-width: 2; r: 6; cursor: grab !important; transition: 0.2s; }
.edit-node:hover { r: 9; stroke: var(--primary); fill: var(--primary-light); z-index: 100; }
.edit-node.dragging { cursor: grabbing !important; fill: var(--secondary); stroke: white; r: 12; }

.start-node { fill: white; stroke: var(--accent-green); stroke-width: 3; r: 7; cursor: crosshair !important; animation: pulseNode 1.5s infinite; }
@keyframes pulseNode { 0% { box-shadow: 0 0 0 0 rgba(16,185,129,0.4); } 70% { box-shadow: 0 0 0 10px rgba(16,185,129,0); } 100% { box-shadow: 0 0 0 0 rgba(16,185,129,0); } }

/* 오른쪽: 코드 뷰어 */
.code-sidebar { width: 380px; background: #1e293b; padding: 20px; overflow-y: auto; color: #cbd5e1; font-family: 'JetBrains Mono', monospace; font-size: 0.85rem; line-height: 1.6; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); display: flex; flex-direction: column; flex-shrink: 0; }
.code-title { color: #f8fafc; margin-bottom: 15px; font-weight: 900; font-size: 1.05rem; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #334155; padding-bottom: 10px;}
.code-hl-tag { color: #f472b6; }
.code-hl-attr { color: #38bdf8; }
.code-hl-val { color: #fcd34d; font-weight: bold; }
.code-item { margin-bottom: 12px; padding: 10px; border-radius: 8px; transition: 0.2s; border-left: 3px solid transparent; background: rgba(0,0,0,0.2);}
.code-item:hover { background: rgba(255,255,255,0.08); border-left-color: var(--primary); }

/* 알림 토스트 */
.toast { position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%) translateY(150px); background: #334155; color: white; padding: 14px 28px; border-radius: 30px; font-weight: 800; font-size: 1rem; box-shadow: 0 10px 30px rgba(0,0,0,0.3); transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); z-index: 9999; pointer-events: none;}
.toast.show { transform: translateX(-50%) translateY(0); }

        #dbb-topnav a.dbb-btn, #dbb-topnav button.dbb-btn {
            display: inline-flex; align-items: center; gap: 5px;
            font-size: 0.72rem; font-weight: 700; letter-spacing: 0.3px;
            text-decoration: none;
            padding: 6px 14px; border-radius: 20px;
            border: 1.5px solid rgba(255,255,255,0.25);
            color: #f8fafc;
            background: rgba(255,255,255,0.08);
            transition: all 0.18s ease;
            white-space: nowrap;
            cursor: pointer;
        }
        #dbb-topnav a.dbb-btn:hover, #dbb-topnav button.dbb-btn:hover {
            background: rgba(255,255,255,0.18);
            border-color: rgba(255,255,255,0.5);
            box-shadow: 0 0 14px rgba(255,255,255,0.15);
            transform: translateY(-1px);
        }
        #dbb-topnav .dbb-title {
            font-size: 0.82rem; font-weight: 800;
            color: #e9d5ff;
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>

<div id="dbb-topnav">
    <div style="display:flex;gap:9px;align-items:center;">
        <a class="dbb-btn" href="index.html">← 메인으로</a>
        <a class="dbb-btn" href="이미지_개념.html">📖 개념으로</a>
        <a class="dbb-btn" href="이미지_활용실습.html">🎮 게임 선택</a>
    </div>
    <span class="dbb-title">🎨 이미지의 디지털 표현 · 벡터 이미지 활용 실습</span>
    <div class="header-badges">
        <div class="badge">개체: <span id="objCount">0</span>개</div>
        <div class="badge" style="background:#fce7f3; color:#db2777; border-color: rgba(219, 39, 119, 0.3);">좌표: <span id="coordCount">0</span>개</div>
    </div>
</div>

<div class="main-area">
  <div class="control-panel">
    
    <div class="panel-section">
      <div class="section-title">🛠️ 도구 선택</div>
      <div class="mode-grid">
        <div class="mode-btn active" id="btn-draw" onclick="setMode('draw')"><span>✏️</span>선 그리기</div>
        <div class="mode-btn" id="btn-fill" onclick="setMode('fill')"><span>🪣</span>색칠하기</div>
        <div class="mode-btn" id="btn-edit" onclick="setMode('edit')"><span>👆</span>수정하기</div>
        <div class="mode-btn" id="btn-erase" onclick="setMode('erase')"><span>🧼</span>지우개</div>
      </div>
      <div class="help-box" id="help-text">
        <b>[선 그리기]</b><br>도화지를 클릭해 점을 찍어 선을 만듭니다. 첫 점을 누르면 닫힌 면이 되고, '경로 종료'를 누르면 열린 선이 됩니다.
      </div>
    </div>

    <div class="panel-section">
      <div class="section-title">🎨 속성 조절 (선/면 색상)</div>
      <div class="palette" id="color-palette">
        </div>
      <div style="margin-top: 15px;">
        <div style="font-size: 0.85rem; font-weight: 700; color: var(--text-muted); margin-bottom: 8px;">선 두께 (Stroke Width)</div>
        <div class="slider-wrap">
          <input type="range" class="slider" id="stroke-slider" min="1" max="20" value="4" oninput="updateStrokeWidth()">
          <span class="slider-val" id="stroke-val">4</span>
        </div>
      </div>
      
      <div class="action-row">
        <button class="btn btn-finish" id="btn-finish-path" onclick="finishPath(false)" disabled>✔️ 경로 종료</button>
        <button class="btn btn-clear" onclick="clearCanvas()">🗑️ 지우기</button>
      </div>
    </div>
  </div>

  <div class="canvas-area" id="canvas-area">
    <div class="svg-wrap mode-draw" id="svg-wrap">
      <svg id="artCanvas" xmlns="http://www.w3.org/2000/svg">
        <g id="grid-layer"></g>

        <g id="objects-group"></g>
        
        <g id="drawing-layer">
          <polyline id="drawing-path" class="drawing-temp-line" points=""></polyline>
          <line id="preview-line" class="drawing-temp-line" x1="-10" y1="-10" x2="-10" y2="-10" style="display:none;"></line>
          <circle id="start-node" class="start-node" cx="-50" cy="-50" style="display:none;"></circle>
        </g>
        
        <g id="edit-nodes-group"></g>
      </svg>
    </div>
  </div>

  <div class="code-sidebar">
    <div class="code-title">
      <span>&lt;svg&gt; 코드 보기</span>
      <span style="font-weight:normal; color:#94a3b8; font-size:0.8rem;">실시간 반영</span>
    </div>
    <div style="margin-bottom: 10px; color:#f472b6;">&lt;svg viewBox="0 0 1200 1000"&gt;</div>
    
    <div id="code-output" style="flex:1;">
      </div>
    
    <div style="margin-top: 10px; color:#f472b6;">&lt;/svg&gt;</div>
  </div>

</div>

<div class="toast" id="toast">알림 메시지</div>

<script>
// --- 전역 상태 ---
const paletteColors = [
  'none', /* 투명(색 없음) */
  '#1e293b', '#64748b', '#ef4444', '#f97316', '#f59e0b', '#84cc16', 
  '#10b981', '#14b8a6', '#06b6d4', '#0ea5e9', '#3b82f6', '#8b5cf6', '#ec4899'
];
let activeColor = '#0ea5e9';
let currentMode = 'draw'; // draw, fill, edit, erase
let currentStrokeWidth = 4;

// 데이터 모델
let vectorObjects = []; // { type: 'polyline'|'polygon', points: [{x,y}], stroke: str, strokeWidth: num, fill: str }
let currentPath = [];

// DOM 요소
const svgEl = document.getElementById('artCanvas');
const svgWrap = document.getElementById('svg-wrap');
const drawingPathEl = document.getElementById('drawing-path');
const previewLineEl = document.getElementById('preview-line');
const startNodeEl = document.getElementById('start-node');

let dragState = null; // { objIdx, ptIdx }

// --- 초기화 ---
function init() {
  drawGridLabels(); // 배경에 X,Y 좌표 축 그리기
  renderPalette();
  setMode('draw');
}

// ⭐ 모눈종이 및 100단위 X,Y 좌표 텍스트, 원점 안내선 렌더링
function drawGridLabels() {
  const gridLayer = document.getElementById('grid-layer');
  if(!gridLayer) return;
  
  let html = '';
  // 100 간격으로 라인과 텍스트 생성
  for(let i=100; i<=2000; i+=100) {
    // 세로선 (X 좌표)
    html += `<line x1="${i}" y1="0" x2="${i}" y2="2000" stroke="#e2e8f0" stroke-width="1" />`;
    html += `<text x="${i+4}" y="16" fill="#94a3b8" font-size="12" font-weight="bold" font-family="JetBrains Mono">${i}</text>`;
    // 가로선 (Y 좌표)
    html += `<line x1="0" y1="${i}" x2="2000" y2="${i}" stroke="#e2e8f0" stroke-width="1" />`;
    html += `<text x="4" y="${i-4}" fill="#94a3b8" font-size="12" font-weight="bold" font-family="JetBrains Mono">${i}</text>`;
  }
  
  // 화살표 길이 단축 및 위치 조정
  // X축 화살표 (오른쪽으로)
  html += `<line x1="0" y1="0" x2="45" y2="0" stroke="#ff2d55" stroke-width="5" />`;
  html += `<polygon points="45,-5 55,0 45,5" fill="#ff2d55" />`;
  html += `<text x="60" y="14" fill="#ff2d55" font-size="13" font-weight="900">X축(+)</text>`;
  
  // Y축 화살표 (아래쪽으로)
  html += `<line x1="0" y1="0" x2="0" y2="45" stroke="#0071e3" stroke-width="5" />`;
  html += `<polygon points="-5,45 0,55 5,45" fill="#0071e3" />`;
  html += `<text x="10" y="65" fill="#0071e3" font-size="13" font-weight="900">Y축(+)</text>`;

  // 원점(0,0) 표시
  html += `<circle cx="0" cy="0" r="14" fill="white" />`;
  html += `<circle cx="0" cy="0" r="3" fill="#1e293b" />`;
  html += `<text x="8" y="20" fill="#1e293b" font-size="13" font-weight="900" font-family="JetBrains Mono">(0,0)</text>`;
  
  gridLayer.innerHTML = html;
}

// 24비트 트루컬러(사용자 지정 색상) 인풋 포함 렌더링
function renderPalette() {
  const pal = document.getElementById('color-palette');
  let html = '';
  
  paletteColors.forEach((c, i) => {
    if(c === 'none') {
      html += `<div class="color-swatch ${c===activeColor?'active':''}" style="background:white; display:flex; align-items:center; justify-content:center; border:2px solid #e2e8f0;" onclick="selectColor('${c}')" title="색상 없음 (투명)"><span style="color:#ef4444; font-weight:900;">X</span></div>`;
    } else {
      html += `<div class="color-swatch ${c===activeColor?'active':''}" style="background:${c};" onclick="selectColor('${c}')"></div>`;
    }
  });

  // 트루컬러 선택기
  const isCustomColor = !paletteColors.includes(activeColor) && activeColor !== 'none';
  html += `
    <div class="color-swatch ${isCustomColor ? 'active' : ''}" style="background: conic-gradient(red, yellow, lime, aqua, blue, magenta, red); display:flex; align-items:center; justify-content:center; position:relative; border: 2px solid white; box-shadow: 0 0 0 2px #cbd5e1;" title="24비트 트루컬러 선택">
      <input type="color" id="custom-color-picker" value="${isCustomColor ? activeColor : '#0ea5e9'}" style="opacity:0; position:absolute; width:100%; height:100%; cursor:pointer;" oninput="selectColor(this.value)">
    </div>
  `;

  pal.innerHTML = html;
}

function selectColor(c) {
  activeColor = c;
  renderPalette(); // UI 업데이트
  
  if (currentMode === 'draw') {
    drawingPathEl.style.stroke = (c === 'none' ? '#cbd5e1' : c);
  }
}

function updateStrokeWidth() {
  currentStrokeWidth = document.getElementById('stroke-slider').value;
  document.getElementById('stroke-val').textContent = currentStrokeWidth;
  if(currentMode === 'draw') {
    drawingPathEl.style.strokeWidth = currentStrokeWidth;
  }
}

function setMode(mode) {
  currentMode = mode;
  document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(`btn-${mode}`).classList.add('active');
  
  // SVG 래퍼 클래스 변경 (마우스 커서/호버 효과 처리용)
  svgWrap.className = `svg-wrap mode-${mode}`;

  const help = document.getElementById('help-text');
  if(mode === 'draw') {
    help.innerHTML = "<b>[선 그리기]</b><br>도화지를 클릭해 점을 찍어 선을 만듭니다. 첫 점을 다시 클릭하면 닫힌 면이 되고, '경로 종료'를 누르면 열린 선이 됩니다.";
  } else if(mode === 'fill') {
    help.innerHTML = "<b>[색칠하기]</b><br>팔레트에서 색상을 고르고 도화지의 선이나 면을 클릭하면 내부(Fill)가 채워집니다. 투명(X)을 누르면 색이 빠집니다.";
    cancelDrawing();
  } else if(mode === 'edit') {
    help.innerHTML = "<b>[수정하기]</b><br>개체의 점(노드)들을 마우스로 잡고 드래그하여 좌표를 수정해 형태를 바꿀 수 있습니다.";
    cancelDrawing();
  } else if(mode === 'erase') {
    help.innerHTML = "<b>[지우개]</b><br>삭제하고 싶은 개체(선이나 도형)를 클릭하면 코드가 함께 지워집니다.";
    cancelDrawing();
  }
  
  renderCanvas(); // 모드 변경시 노드 표시 여부 등을 위해 재렌더링
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2000);
}

function clearCanvas() {
  vectorObjects = [];
  cancelDrawing();
  renderCanvas();
  showToast('도화지를 깔끔하게 지웠습니다!');
}

function cancelDrawing() {
  currentPath = [];
  updateDrawingPreview();
  document.getElementById('btn-finish-path').disabled = true;
}

// 마우스 좌표 구하기 (SVG 내부 좌표계 기준)
function getMousePos(evt) {
  const CTM = svgEl.getScreenCTM();
  const clientX = evt.touches ? evt.touches[0].clientX : evt.clientX;
  const clientY = evt.touches ? evt.touches[0].clientY : evt.clientY;
  return {
    x: (clientX - CTM.e) / CTM.a,
    y: (clientY - CTM.f) / CTM.d
  };
}

// --- 마우스 이벤트 처리 ---
svgEl.addEventListener('mousedown', handleMouseDown);
svgEl.addEventListener('mousemove', handleMouseMove);
window.addEventListener('mouseup', handleMouseUp);
// 터치 지원
svgEl.addEventListener('touchstart', (e)=> { if(e.target.tagName !== 'BUTTON' && e.target.tagName !== 'INPUT'){ e.preventDefault(); handleMouseDown({clientX: e.touches[0].clientX, clientY: e.touches[0].clientY, target: document.elementFromPoint(e.touches[0].clientX, e.touches[0].clientY)}); }}, {passive: false});
svgEl.addEventListener('touchmove', (e)=> { e.preventDefault(); handleMouseMove({clientX: e.touches[0].clientX, clientY: e.touches[0].clientY}); }, {passive: false});
window.addEventListener('touchend', handleMouseUp);

function handleMouseDown(e) {
  const target = e.target;
  const pt = getMousePos(e);

  if (currentMode === 'draw') {
    // 1. 첫 점을 눌러서 '닫힌 도형(polygon)' 만들기
    if (target.id === 'start-node' && currentPath.length >= 2) {
      finishPath(true);
      return;
    }
    // 2. 빈 곳을 눌러 새 점 찍기
    // 마지막 점과 같으면 무시
    if (currentPath.length > 0) {
      const last = currentPath[currentPath.length-1];
      if(Math.abs(last.x - pt.x) < 5 && Math.abs(last.y - pt.y) < 5) return;
    }
    
    currentPath.push({x: pt.x, y: pt.y});
    drawingPathEl.style.stroke = (activeColor === 'none' ? '#cbd5e1' : activeColor);
    drawingPathEl.style.strokeWidth = currentStrokeWidth;
    updateDrawingPreview();
    document.getElementById('btn-finish-path').disabled = false;
  }
  else if (currentMode === 'edit') {
    // 편집 노드 잡기
    if (target.classList.contains('edit-node')) {
      const oIdx = target.getAttribute('data-obj');
      const pIdx = target.getAttribute('data-pt');
      dragState = { objIdx: oIdx, ptIdx: pIdx };
      target.classList.add('dragging');
    }
  }
  else if (currentMode === 'fill') {
    // 개체 클릭하여 색 채우기
    if (target.classList.contains('drawn-obj')) {
      const idx = target.getAttribute('data-idx');
      vectorObjects[idx].fill = activeColor;
      // 선(polyline)인데 색을 채우려 하면 polygon으로 타입 변환
      if(activeColor !== 'none' && vectorObjects[idx].type === 'polyline' && vectorObjects[idx].points.length > 2) {
          vectorObjects[idx].type = 'polygon';
      }
      renderCanvas();
    }
  }
  else if (currentMode === 'erase') {
    // 개체 클릭하여 지우기
    if (target.classList.contains('drawn-obj')) {
      const idx = target.getAttribute('data-idx');
      vectorObjects.splice(idx, 1);
      renderCanvas();
      showToast('개체가 삭제되었습니다.');
    }
  }
}

function handleMouseMove(e) {
  const pt = getMousePos(e);

  if (currentMode === 'draw' && currentPath.length > 0) {
    const lastPt = currentPath[currentPath.length - 1];
    previewLineEl.setAttribute('x1', lastPt.x);
    previewLineEl.setAttribute('y1', lastPt.y);
    previewLineEl.setAttribute('x2', pt.x);
    previewLineEl.setAttribute('y2', pt.y);
    previewLineEl.style.stroke = (activeColor === 'none' ? '#cbd5e1' : activeColor);
    previewLineEl.style.strokeWidth = currentStrokeWidth;
    previewLineEl.style.display = 'block';
    
    // 첫 점 근처에 가면 자석처럼 붙는 느낌을 위해 닫기 타겟 위치 업데이트
    const firstPt = currentPath[0];
    startNodeEl.setAttribute('cx', firstPt.x);
    startNodeEl.setAttribute('cy', firstPt.y);
    startNodeEl.style.display = 'block';
  }
  else if (currentMode === 'edit' && dragState) {
    // 실시간 드래그 반영
    vectorObjects[dragState.objIdx].points[dragState.ptIdx] = {x: pt.x, y: pt.y};
    
    // DOM 즉시 업데이트 (부드러운 드래그)
    const objEl = document.querySelector(`.drawn-obj[data-idx="${dragState.objIdx}"]`);
    const ptsStr = vectorObjects[dragState.objIdx].points.map(p => `${p.x},${p.y}`).join(' ');
    if(objEl) objEl.setAttribute('points', ptsStr);
    
    const nodeEl = document.querySelector(`.edit-node[data-obj="${dragState.objIdx}"][data-pt="${dragState.ptIdx}"]`);
    if(nodeEl) { nodeEl.setAttribute('cx', pt.x); nodeEl.setAttribute('cy', pt.y); }
    
    updateCodeViewer(); // 코드 창도 실시간 업데이트
  }
}

function handleMouseUp(e) {
  if (dragState) {
    const nodeEl = document.querySelector('.edit-node.dragging');
    if(nodeEl) nodeEl.classList.remove('dragging');
    dragState = null;
    renderCanvas(); // 최종 정리
  }
}

// 캔버스 벗어나면 미리보기 선 숨김
svgWrap.addEventListener('mouseleave', () => {
  previewLineEl.style.display = 'none';
});

// --- 그리기 로직 ---
function updateDrawingPreview() {
  if (currentPath.length === 0) {
    drawingPathEl.setAttribute('points', '');
    previewLineEl.style.display = 'none';
    startNodeEl.style.display = 'none';
  } else {
    drawingPathEl.setAttribute('points', currentPath.map(p => `${p.x},${p.y}`).join(' '));
    // 첫 점에 닫기 타겟 렌더링
    const firstPt = currentPath[0];
    startNodeEl.setAttribute('cx', firstPt.x);
    startNodeEl.setAttribute('cy', firstPt.y);
    startNodeEl.style.display = 'block';
  }
}

// 현재 경로를 확정하여 개체 배열에 추가 (isClosed: true면 polygon, false면 polyline)
function finishPath(isClosed) {
  if(currentPath.length < 2) {
    cancelDrawing(); return;
  }
  
  const newObj = {
    type: isClosed ? 'polygon' : 'polyline',
    points: [...currentPath],
    stroke: activeColor === 'none' ? '#1e293b' : activeColor, // 선 색상이 none이면 기본 검정 계열
    strokeWidth: currentStrokeWidth,
    fill: isClosed ? 'rgba(255,255,255,0.8)' : 'none' // 열린선은 채우기 없음 기본
  };
  
  vectorObjects.push(newObj);
  
  cancelDrawing();
  renderCanvas();
  showToast(isClosed ? '닫힌 도형(면)이 생성되었습니다!' : '열린 선(경로)이 확정되었습니다.');
}

// --- 전체 렌더링 ---
function renderCanvas() {
  const objGroup = document.getElementById('objects-group');
  const nodeGroup = document.getElementById('edit-nodes-group');
  
  let objHTML = '';
  let nodeHTML = '';
  let totalPts = 0;

  vectorObjects.forEach((obj, oIdx) => {
    const ptsStr = obj.points.map(p => `${p.x},${p.y}`).join(' ');
    // 태그명 결정 (polygon or polyline)
    const tag = obj.type;
    
    // 개체 렌더링
    objHTML += `<${tag} class="drawn-obj" data-idx="${oIdx}" points="${ptsStr}" fill="${obj.fill}" stroke="${obj.stroke}" stroke-width="${obj.strokeWidth}" stroke-linecap="round" stroke-linejoin="round" />`;
    
    // 수정 모드일 때만 각 꼭짓점 노드 렌더링
    if (currentMode === 'edit') {
      obj.points.forEach((pt, pIdx) => {
        nodeHTML += `<circle cx="${pt.x}" cy="${pt.y}" class="edit-node" data-obj="${oIdx}" data-pt="${pIdx}" />`;
      });
    }
    totalPts += obj.points.length;
  });

  objGroup.innerHTML = objHTML;
  nodeGroup.innerHTML = nodeHTML;

  // 뱃지 업데이트
  document.getElementById('objCount').textContent = vectorObjects.length;
  document.getElementById('coordCount').textContent = totalPts;
  
  updateCodeViewer();
}

// --- 코드 뷰어 업데이트 ---
function updateCodeViewer() {
  const viewer = document.getElementById('code-output');
  if (vectorObjects.length === 0) {
    viewer.innerHTML = '<div style="color:var(--text-muted); padding: 10px;">&lt;!-- 도화지에 선을 그려 데이터(좌표)를 만들어보세요! --&gt;</div>';
    return;
  }

  let html = '';
  vectorObjects.forEach(obj => {
    // 좌표값 정수로 깔끔하게 표시
    const pts = obj.points.map(p => `${Math.round(p.x)},${Math.round(p.y)}`).join(' ');
    html += `
      <div class="code-item">
        &lt;<span class="code-hl-tag">${obj.type}</span><br> 
        &nbsp;&nbsp;<span class="code-hl-attr">points</span>="<span class="code-hl-val">${pts}</span>"<br>
        &nbsp;&nbsp;<span class="code-hl-attr">stroke</span>="<span style="color:${obj.stroke==='none'?'#cbd5e1':obj.stroke}; font-weight:bold;">${obj.stroke}</span>" 
        <span class="code-hl-attr">stroke-width</span>="<span style="color:white;">${obj.strokeWidth}</span>"<br>
        &nbsp;&nbsp;<span class="code-hl-attr">fill</span>="<span style="color:${obj.fill==='none'?'#cbd5e1':obj.fill}; font-weight:bold;">${obj.fill}</span>" /&gt;
      </div>`;
  });
  viewer.innerHTML = html;
}

// 시작
init();
</script>
</body>
</html>
